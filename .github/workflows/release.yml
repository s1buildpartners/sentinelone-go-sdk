name: Create GitHub Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Extract changelog notes
        id: changelog
        run: |
          # Strip the leading 'v' to match the CHANGELOG section header, e.g. [1.2.3]
          VERSION="${GITHUB_REF_NAME#v}"

          # Extract the block between "## [VERSION]" and the next "## [" heading.
          # The awk script skips the matched header line itself so only the body
          # (Added / Changed / Fixed sections, etc.) ends up in the output.
          NOTES=$(awk "
            /^## \[${VERSION}\]/ { found=1; next }
            /^## \[/            { if (found) exit }
            found               { print }
          " CHANGELOG.md)

          if [ -z "$NOTES" ]; then
            echo "::warning::No changelog entry found for version ${VERSION}. Release notes will be empty."
          fi

          # Write to a file so that multi-line content survives the env boundary
          printf '%s\n' "$NOTES" > release_notes.md

      - name: Create GitHub release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          body_path: release_notes.md
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
